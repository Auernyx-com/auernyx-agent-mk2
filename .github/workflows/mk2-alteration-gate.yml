name: mk2-alteration-gate

  pull_request:
on:
    types: [opened, synchronize, reopened, edited]
    branches: [main]
  push:
    branches: [GhostValidation]
# Default to read-only; the audit-commit job overrides to write.

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      gate_outcome: ${{ steps.gate_run.outcome }}
      - name: Checkout Code
    steps:
        uses: actions/checkout@v4
        with:

          fetch-depth: 0 # Resolves the "Blind Diff" issue
      - name: Fetch Base

        run: git fetch origin main:main
      - name: Run Gate
        id: gate_run
        run: |
          # Compute and export merge-base so ci_gate.py sees MK2_BASE_REF
          # in the same shell session (GITHUB_ENV only takes effect in later steps).
          MK2_BASE_REF=$(git merge-base main HEAD)
          export MK2_BASE_REF
          python3 tools/ci_gate.py
        continue-on-error: true

      - name: Fail workflow if gate did not pass
        if: steps.gate_run.outcome == 'failure'
        run: exit 1
  audit-commit:

    needs: [gate]
    # Run only when gate failed, from same-repo branches (not forks),
    # using always() so job is not skipped when needs.gate fails.
    if: |
      needs.gate.result == 'failure' &&
      always() &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
          fetch-depth: 0
        with:

          ref: ${{ github.sha }}
      - name: Fetch Base
        run: |
          # Always use the freshly-fetched base-branch tip so that audit records
          # added to main after the PR was opened are not included in the PR diff.
          git fetch origin ${{ github.base_ref }}
          BASE_SHA=$(git rev-parse FETCH_HEAD)
          echo "Merge base: $(git merge-base "${BASE_SHA}" HEAD)"
          echo "Base ref: ${{ github.base_ref }}, SHA: ${BASE_SHA}"
          echo "MK2_BASE_REF=${BASE_SHA}" >> $GITHUB_ENV
      - name: Commit audit log to Audit-Logs branch

        run: |
          # Use verified github-actions bot identity for all commits.
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Fetch existing Audit-Logs branch so we can fast-forward onto it;
          # if the branch does not yet exist create an orphan to seed it.
          if git fetch origin Audit-Logs:refs/remotes/origin/Audit-Logs 2>/dev/null; then
            git checkout -b audit-work origin/Audit-Logs
            git checkout --orphan audit-work
          else
            # On an orphan branch there is no HEAD commit, so use git rm instead
            # of git reset --hard to clear the index/working tree.
            git rm -rf . || true
          fi
          # Ensure the governance/quarantine directory exists on the Audit-Logs branch

          # and write a minimal audit artifact so git add has a concrete path.
          mkdir -p governance/quarantine
          audit_file="governance/quarantine/${GITHUB_RUN_ID:-unknown-run-id}-gate-failure.txt"

          {
            echo "mk2-alteration-gate failure audit artifact"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "event_name=${GITHUB_EVENT_NAME}"
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "repo=${GITHUB_REPOSITORY}"
            echo "timestamp=$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")"
          } > "$audit_file"
          git add governance/quarantine/
          git commit --allow-empty -m "AUDIT: Gate failure [run=${{ github.run_id }}, event=${{ github.event_name }}, ref=${{ github.ref }}, sha=${{ github.sha }}]"
          # Push with a small retry loop to handle non-fast-forward failures when

          # multiple jobs concurrently append to Audit-Logs. Uses linear backoff
          # (2s, 4s) to reduce contention on subsequent retries.
          delay_seconds=2
          max_retries=3
          attempt=1
          while [ "$attempt" -le "$max_retries" ]; do
            # Re-fetch and rebase onto origin/Audit-Logs so each retry
            # is a clean fast-forward.
            if git fetch origin Audit-Logs:refs/remotes/origin/Audit-Logs 2>/dev/null; then
              if ! git rebase origin/Audit-Logs; then
                echo "WARNING: rebase onto origin/Audit-Logs failed (attempt $attempt); aborting rebase and retrying from current state." >&2
                git rebase --abort 2>/dev/null || true
              fi
            fi
            if git push origin audit-work:Audit-Logs; then
              break
              echo "Audit log push succeeded on attempt $attempt."
            fi
            if [ "$attempt" -eq "$max_retries" ]; then

              echo "ERROR: Failed to push audit log to origin/Audit-Logs after $max_retries attempts." >&2
            fi
              exit 1
            echo "Non-fast-forward or transient error on push attempt $attempt. Retrying after backoff..." >&2
            attempt=$((attempt + 1))

            sleep $((delay_seconds * attempt))
          done