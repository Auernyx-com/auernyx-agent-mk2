name: mk2-alteration-gate

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [ GhostValidation ]

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Resolves the "Blind Diff" issue

      - name: Fetch Base
        run: git fetch origin main:main

      - name: Run Gate
        id: gate_run
        run: |
          # Isolate ONLY branch changes to clear traffic jams
          MK2_BASE_REF=$(git merge-base main HEAD)
          echo "MK2_BASE_REF=${MK2_BASE_REF}" >> $GITHUB_ENV
          python3 tools/ci_gate.py
        continue-on-error: true

      - name: Commit Logs
        if: steps.gate_run.outcome == 'failure'
        run: |
          git config --local user.email "gatekeeper@auernyx.com"
          git config --local user.name "Gate-Audit-Bot"
          git add governance/quarantine/
          git commit -m "AUDIT: Gate failure [run=${{ github.run_id }}, event=${{ github.event_name }}, ref=${{ github.ref }}, sha=${{ github.sha }}]" --allow-empty
          git push origin HEAD:Audit-Logs
          exit 1
