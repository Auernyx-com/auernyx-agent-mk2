name: mk2-alteration-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [ main ]
  push:
    branches: [ GhostValidation ]

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Resolves the "Blind Diff" issue

      - name: Fetch Base
        run: git fetch origin main:main

      - name: Run Gate
        id: gate_run
        run: |
          # Isolate ONLY branch changes to clear traffic jams
          FILES=$(git diff --name-only origin/main...HEAD)
          python3 tools/ci_gate.py $FILES
        continue-on-error: true

      - name: Commit Logs
        if: steps.gate_run.outcome == 'failure'
        run: |
          git config --local user.email "gatekeeper@auernyx.com"
          git config --local user.name "Gate-Audit-Bot"
          git add governance/quarantine/
          git commit -m "AUDIT: Quarantined gate failure" || true
          git push origin HEAD:Audit-Logs || true
          exit 1
